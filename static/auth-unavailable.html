<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Service Temporarily Unavailable — Lucerna</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
    background-color: #1a1a1a;
    color: #d4d0cc;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .error-card {
    max-width: 28rem;
    text-align: center;
    padding: 2.5rem 2rem;
    border: 1px solid #3a3530;
    border-radius: 0.5rem;
    border-top: 3px solid #E8AD4A;
    background-color: #2A2725;
  }
  .error-code {
    font-size: 3rem;
    font-weight: 700;
    color: #E8AD4A;
    line-height: 1;
    margin-bottom: 0.75rem;
  }
  .error-title {
    font-size: 1.25rem;
    font-weight: 600;
    color: #e8e4e0;
    margin-bottom: 1rem;
  }
  .error-desc {
    font-size: 0.9375rem;
    line-height: 1.6;
    color: #a09890;
    margin-bottom: 1.5rem;
  }
  .error-actions {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .error-btn {
    display: inline-flex;
    align-items: center;
    padding: 0.5rem 1.25rem;
    min-height: 2.75rem;
    font-size: 0.875rem;
    font-weight: 600;
    text-decoration: none;
    border-radius: 0.375rem;
    border: 1px solid #E8AD4A;
    color: #E8AD4A;
    background: transparent;
    transition: background-color 0.15s ease, color 0.15s ease;
  }
  .error-btn:hover {
    background-color: #E8AD4A;
    color: #1a1a1a;
  }
  .error-btn:focus-visible {
    outline: 2px solid #E8AD4A;
    outline-offset: 2px;
  }
  .error-btn--primary {
    background-color: #E8AD4A;
    color: #1a1a1a;
  }
  .error-btn--primary:hover {
    background-color: #d49a3a;
    color: #1a1a1a;
  }
  .error-footer {
    margin-top: 2rem;
    font-size: 0.75rem;
    color: #6b6560;
  }
  @media (prefers-reduced-motion: reduce) {
    .error-btn { transition: none; }
  }
</style>
</head>
<body>
<main class="error-card" role="main">
  <div class="error-code">503</div>
  <h1 class="error-title">Authentication service temporarily unavailable</h1>
  <p class="error-desc">The login service is currently unreachable. This is usually a brief interruption. Try again in a few moments.</p>
  <div class="error-actions">
    <a href="javascript:location.reload()" class="error-btn error-btn--primary">Retry</a>
    <a href="/" class="error-btn">Homepage</a>
  </div>
  <p class="error-footer">Lucerna OSINT Research Lab</p>
</main>
</body>
</html>
