# Public URL paths for Lucerna
# Source of truth for paths that bypass OAuth2 (auth_request off)
# Format: TYPE PATH [COMMENT]
#   TYPE: exact (location =), prefix (location), regex (location ~)
#   PATH: nginx location path
#
# Managed by: scripts/manage-urls.mjs
# Applied to: deploy/nginx-default.conf
#
# Infrastructure paths (do not remove)
exact   /oauth2/                        # OAuth2 proxy
exact   /robots.txt                     # SEO crawler access
exact   /403.html                       # Error page
regex   /sitemap\.xml$                  # Sitemaps for SEO
regex   \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$   # Image caching
regex   \.(css|js|woff|woff2|ttf|eot)$             # Asset caching

# Legal pages (GDPR compliance — must be public)
prefix  /legal/
prefix  /ru/legal/
prefix  /pt/legal/

# About pages
prefix  /about/
prefix  /ru/about/
prefix  /pt/about/

# Methodology pages
prefix  /methodology/
prefix  /ru/methodology/
prefix  /pt/methodology/

# Homepage (EN/RU/PT)
exact   /
exact   /index.html
exact   /ru/
exact   /pt/

# Services (EN/RU/PT)
exact   /services/
exact   /ru/services/
exact   /pt/services/

# Research landing page (EN/RU/PT)
exact   /research/
exact   /ru/research/
exact   /pt/research/

# Studies index (EN/RU/PT)
exact   /studies/
exact   /ru/studies/
exact   /pt/studies/

# Investigations listing (EN/RU/PT)
exact   /investigations/
exact   /ru/investigations/
exact   /pt/investigations/

# Public study series (regex for EN/RU/PT)
regex   ^/(ru/|pt/)?studies/mushroom-brain-              # Mushroom & Brain series
regex   ^/(ru/|pt/)?studies/eu-ai-act-                   # EU AI Act series
regex   ^/(ru/|pt/)?studies/rastafari-                    # Rastafari series
regex   ^/(ru/|pt/)?studies/scatology-                    # Scatology series
regex   ^/(ru/|pt/)?studies/(karma-proverb|immortal-proverb|drug-content-legislation|hymn-democratic-youth|ai-labor-market)   # Standalone articles

# Public sections (regex for EN/RU/PT)
regex   ^/(ru/|pt/)?verifications/                       # Verifications
regex   ^/(ru/|pt/)?toolkit/                             # Toolkit
regex   ^/(ru/|pt/)?newsletter(/|$)                      # Newsletter landing

# INV-035 public dossier
regex   ^/(ru/|pt/)?investigations/osint-career-reconstruction-case

# FP3D Labor Case Study (VERSION B — partially_verified)
regex   ^/(ru/|pt/)?investigations/flightpath3d-labor-case-study

# Tags and categories (SEO)
regex   ^/(ru/|pt/)?tags/
regex   ^/(ru/|pt/)?categories/

# Reviews (StatiCrypt, no OAuth — LCRN-035)
prefix  /reviews/
