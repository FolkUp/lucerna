# FlightPath3D Case Dossier - Basic HTTP Auth Configuration
# LCRN-061/062/063: Banking-level security for simplified directory access
# Updated: Removed complex search, implemented simple directory listing

# Rate limiting for dossier access (prevent abuse)
limit_req_zone $binary_remote_addr zone=fp3d_dossier:10m rate=30r/m;

# FlightPath3D Case Dossier - Protected Location
location /search/flightpath3d {
    # Basic HTTP Auth for secure access
    auth_basic "FlightPath3D Case Dossier - Authorized Access Only";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Rate limiting (30 requests per minute per IP - higher for directory browsing)
    limit_req zone=fp3d_dossier burst=10 nodelay;
    limit_req_status 429;

    # Security headers (banking-level)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content Security Policy (updated for directory listing - no external dependencies)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; media-src 'none'; frame-src 'none'; worker-src 'none'; manifest-src 'none';" always;

    # Audit logging for access compliance
    access_log /var/log/nginx/flightpath3d-access.log combined;
    error_log /var/log/nginx/flightpath3d-error.log warn;

    # Mobile/tablet optimization headers
    add_header Cache-Control "public, max-age=300" always;
    add_header Vary "Accept-Encoding, User-Agent" always;

    # Try files (Hugo static site)
    try_files $uri $uri/ =404;
}

# Block direct access to search directory (except via search interface)
location /search/ {
    # Only allow the flightpath3d search page
    location ~ ^/search/flightpath3d(/.*)?$ {
        # This will be handled by the location block above
        try_files $uri $uri/ =404;
    }

    # Deny everything else in search directory
    deny all;
    return 404;
}

# Enhanced security for case-related static files
location /static/search/ {
    # Require authentication for any search-related static files
    auth_basic "FlightPath3D Static Files - Authorized Access Only";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Cache-Control "private, no-cache, no-store, must-revalidate" always;

    # Audit logging
    access_log /var/log/nginx/flightpath3d-static-access.log combined;

    try_files $uri =404;
}