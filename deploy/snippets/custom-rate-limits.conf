# custom-rate-limits.conf — rate-limit zones for FolkUp services
# Deploy: mount as Docker volume to nginx-proxy:
#   /etc/nginx/conf.d/custom-rate-limits.conf
# Must be in http context (nginx-proxy provides this via conf.d include)
#
# Rollback: remove volume mount from docker-compose, restart nginx-proxy

# OAuth2 login rate-limit: 30 requests/minute per IP
# Applies to /oauth2/ location in site configs (NOT /oauth2/auth subrequest)
# Legitimate use: 2-3 logins per session. Scanner baseline: 60+/min
limit_req_zone $binary_remote_addr zone=oauth2_login:10m rate=30r/m;

# Bastion login rate-limit (already defined in bastion-upstream.conf)
# limit_req_zone $binary_remote_addr zone=bastion_login:10m rate=5r/m;
