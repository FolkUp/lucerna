# Security headers for public (indexable) pages
# Include in location blocks that set auth_request off
# Note: nginx add_header in location overrides ALL parent add_header directives,
# so these must be included in every location block that uses add_header.

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header X-XSS-Protection "0" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.folkup.app; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://analytics.folkup.app; frame-src 'none'; worker-src 'self' blob:; base-uri 'self'; form-action 'self';" always;
