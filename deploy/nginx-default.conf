server {
    listen 80;
    server_name lucerna.folkup.app;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # --- Access Control ---
    # Basic auth: only authorized users
    auth_basic "Lucerna — Private Access";
    auth_basic_user_file /etc/nginx/htpasswd;

    # Allow legal pages without auth (both EN and RU)
    location /legal/ {
        auth_basic off;
    }
    location /ru/legal/ {
        auth_basic off;
    }

    # Public articles (selectively opened for sharing)
    # x713 OSINT dossier (public, for sharing with subject)
    location = /x713.html {
        auth_basic off;
    }
    # Mushroom & Brain series (10 articles, RU + EN)
    location ~ ^/(ru/)?investigations/mushroom-brain- {
        auth_basic off;
    }

    # Reviews: no Basic Auth, protected by StatiCrypt per-client passwords
    # location /reviews/ {
    #     auth_basic off;
    # }

    # --- Security Headers (Full Compliance) ---
    # Note: these must be repeated in location blocks that use add_header,
    # because nginx's add_header in a location block overrides ALL parent headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header X-XSS-Protection "0" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.folkup.app; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://analytics.folkup.app; frame-src 'none'; worker-src 'self' blob:; base-uri 'self'; form-action 'self';" always;

    # --- Caching ---
    # Each location block repeats security headers (nginx inheritance rule)
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
        auth_basic off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header X-XSS-Protection "0" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.folkup.app; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://analytics.folkup.app; frame-src 'none'; worker-src 'self' blob:; base-uri 'self'; form-action 'self';" always;
    }

    location ~* \.(css|js|woff|woff2|ttf|eot)$ {
        auth_basic off;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header X-XSS-Protection "0" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.folkup.app; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://analytics.folkup.app; frame-src 'none'; worker-src 'self' blob:; base-uri 'self'; form-action 'self';" always;
    }

    # --- Error pages ---
    error_page 404 /404.html;

    # --- Hugo clean URLs ---
    location / {
        try_files $uri $uri/ =404;
    }
}
