# --- REQUIRED in http block (nginx-proxy level, NOT in this server block) ---
# upstream bastion_auth { server 127.0.0.1:9876; }
# limit_req_zone $binary_remote_addr zone=bastion_login:10m rate=10r/m;
# Deploy via: /etc/nginx/conf.d/bastion-upstream.conf (Docker volume mount)
# See: deploy/bastion-deploy-runbook.md Step 4a

server {
    listen 80;
    server_name lucerna.folkup.app;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # --- OAuth2 Proxy (auth_request mode) ---
    location = /oauth2/auth {
        internal;
        proxy_pass http://oauth2-proxy-app:4180/oauth2/auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Uri $request_uri;
        proxy_set_header Content-Length "";
        proxy_pass_request_body off;
        proxy_buffer_size 8k;
    }

    location /oauth2/ {
        auth_request off;
        proxy_pass http://oauth2-proxy-app:4180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Auth-Request-Redirect $scheme://$host$request_uri;
    }

    # Require authentication (Tier 2 — any Keycloak user)
    auth_request /oauth2/auth;
    error_page 401 = /oauth2/sign_in;
    auth_request_set $auth_user $upstream_http_x_auth_request_user;
    auth_request_set $auth_groups $upstream_http_x_auth_request_groups;

    # --- Public URLs (no auth required, indexable) ---
    # Security headers via include snippets (see deploy/snippets/)

    # Legal pages (GDPR compliance, EN/RU/PT)
    location /legal/ {
        auth_request off;
        include /etc/nginx/snippets/security-headers-public.conf;
    }
    location /ru/legal/ {
        auth_request off;
        include /etc/nginx/snippets/security-headers-public.conf;
    }
    location /pt/legal/ {
        auth_request off;
        include /etc/nginx/snippets/security-headers-public.conf;
    }

    # About pages (EN/RU/PT)
    location /about/ {
        auth_request off;
        include /etc/nginx/snippets/security-headers-public.conf;
    }
    location /ru/about/ {
        auth_request off;
        include /etc/nginx/snippets/security-headers-public.conf;
    }
    location /pt/about/ {
        auth_request off;
        include /etc/nginx/snippets/security-headers-public.conf;
    }

    # Methodology pages (EN/RU/PT)
    location /methodology/ {
        auth_request off;
        include /etc/nginx/snippets/security-headers-public.conf;
    }
    location /ru/methodology/ {
        auth_request off;
        include /etc/nginx/snippets/security-headers-public.conf;
    }
    location /pt/methodology/ {
        auth_request off;
        include /etc/nginx/snippets/security-headers-public.conf;
    }

    # OSINT dossiers (public, for sharing with lawyers/subjects)
    location = /x713.html {
        auth_request off;
        include /etc/nginx/snippets/security-headers-auth.conf;
    }

    # robots.txt — public (must be accessible without auth for crawlers)
    location = /robots.txt {
        auth_request off;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # --- Bastion Auth (cookie-based HTML form, replaces browser popup) ---
    # Upstream: bastion_auth -> 127.0.0.1:9876 (bastion-auth.py)
    # Rate limit zone: bastion_login (10r/m) — defined in http block

    location = /__bastion/check {
        internal;
        proxy_pass http://bastion_auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        set $bastion_cookie "";
        if ($http_cookie ~* "bastion_token=([^;]+)") {
            set $bastion_cookie $1;
        }
        proxy_set_header X-Bastion-Cookie $bastion_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location = /__bastion/login {
        auth_request off;
        alias /usr/share/nginx/html/bastion-login.html;
        default_type text/html;
        add_header Cache-Control "no-store" always;
        include /etc/nginx/snippets/security-headers-auth.conf;
    }

    location = /__bastion/verify {
        auth_request off;
        limit_req zone=bastion_login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://bastion_auth/verify;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;
        proxy_connect_timeout 2s;
        proxy_read_timeout 10s;
        include /etc/nginx/snippets/security-headers-auth.conf;
    }

    location = /__bastion/logout {
        auth_request off;
        add_header Set-Cookie "bastion_token=; Path=/; Max-Age=0; HttpOnly; Secure; SameSite=Strict" always;
        add_header Cache-Control "no-store" always;
        include /etc/nginx/snippets/security-headers-auth.conf;
        return 302 /;
    }

    location @bastion_login {
        set $bastion_redirect $request_uri;
        return 302 /__bastion/login?_redirect=$bastion_redirect;
    }

    # Fallback: plain htpasswd if bastion-auth.py is down
    location @bastion_fallback {
        auth_basic "Restricted Access";
        auth_basic_user_file /run/secrets/htpasswd;
    }

    # FP3D case files — Bastion Auth (HTML form, cookie-based)
    # Fallback to browser popup if Python service unavailable (500/502/504)
    location = /fp3d.html {
        auth_request /__bastion/check;
        error_page 401 = @bastion_login;
        error_page 500 502 504 = @bastion_fallback;
    }
    location = /fp3d-dashboard.html {
        auth_request /__bastion/check;
        error_page 401 = @bastion_login;
        error_page 500 502 504 = @bastion_fallback;
    }

    # --- Studies section (academic research, public articles) ---

    # Studies index (EN/RU/PT) — alias+try_files to avoid index redirect
    location = /studies/ {
        auth_request off;
        alias /usr/share/nginx/html/studies/;
        try_files index.html =404;
        include /etc/nginx/snippets/security-headers-public.conf;
    }
    location = /ru/studies/ {
        auth_request off;
        alias /usr/share/nginx/html/ru/studies/;
        try_files index.html =404;
        include /etc/nginx/snippets/security-headers-public.conf;
    }
    location = /pt/studies/ {
        auth_request off;
        alias /usr/share/nginx/html/pt/studies/;
        try_files index.html =404;
        include /etc/nginx/snippets/security-headers-public.conf;
    }

    # Mushroom & Brain series (public, EN/RU/PT)
    location ~ ^/(ru/|pt/)?studies/mushroom-brain- {
        auth_request off;
        include /etc/nginx/snippets/security-headers-public.conf;
    }

    # EU AI Act series (public, EN/RU/PT)
    location ~ ^/(ru/|pt/)?studies/eu-ai-act- {
        auth_request off;
        include /etc/nginx/snippets/security-headers-public.conf;
    }

    # Rastafari series (public, EN/RU/PT)
    location ~ ^/(ru/|pt/)?studies/rastafari- {
        auth_request off;
        include /etc/nginx/snippets/security-headers-public.conf;
    }

    # Standalone academic articles (public, EN/RU/PT)
    location ~ ^/(ru/|pt/)?studies/(karma-proverb|immortal-proverb|drug-content-legislation|hymn-democratic-youth|ai-labor-market) {
        auth_request off;
        include /etc/nginx/snippets/security-headers-public.conf;
    }

    # Scatology: NO public block — default OAuth2 auth applies

    # --- Investigations section (OSINT dossiers) ---

    # INV-035 Redacted OSINT dossier (public, EN/RU/PT)
    location ~ ^/(ru/|pt/)?investigations/osint-career-reconstruction-case {
        auth_request off;
        include /etc/nginx/snippets/security-headers-public.conf;
    }

    # Investigations listing page (EN/RU/PT) — alias+try_files
    location = /investigations/ {
        auth_request off;
        alias /usr/share/nginx/html/investigations/;
        try_files index.html =404;
        include /etc/nginx/snippets/security-headers-public.conf;
    }
    location = /ru/investigations/ {
        auth_request off;
        alias /usr/share/nginx/html/ru/investigations/;
        try_files index.html =404;
        include /etc/nginx/snippets/security-headers-public.conf;
    }
    location = /pt/investigations/ {
        auth_request off;
        alias /usr/share/nginx/html/pt/investigations/;
        try_files index.html =404;
        include /etc/nginx/snippets/security-headers-public.conf;
    }

    # --- Verifications section (public, EN/RU/PT) ---
    location ~ ^/(ru/|pt/)?verifications/ {
        auth_request off;
        include /etc/nginx/snippets/security-headers-public.conf;
    }

    # --- 301 Redirects: investigations/ -> studies/ (SEO preservation) ---
    location ~ ^(?<lang>/(ru|pt))?/investigations/(mushroom-brain-.*)$ {
        return 301 $lang/studies/$2;
    }
    location ~ ^(?<lang>/(ru|pt))?/investigations/(eu-ai-act-.*)$ {
        return 301 $lang/studies/$2;
    }
    location ~ ^(?<lang>/(ru|pt))?/investigations/(rastafari-.*)$ {
        return 301 $lang/studies/$2;
    }
    location ~ ^(?<lang>/(ru|pt))?/investigations/(karma-proverb-origin.*)$ {
        return 301 $lang/studies/$2;
    }
    location ~ ^(?<lang>/(ru|pt))?/investigations/(immortal-proverb-origin.*)$ {
        return 301 $lang/studies/$2;
    }
    location ~ ^(?<lang>/(ru|pt))?/investigations/(drug-content-legislation.*)$ {
        return 301 $lang/studies/$2;
    }
    location ~ ^(?<lang>/(ru|pt))?/investigations/(hymn-democratic-youth.*)$ {
        return 301 $lang/studies/$2;
    }
    location ~ ^(?<lang>/(ru|pt))?/investigations/(ai-labor-market.*)$ {
        return 301 $lang/studies/$2;
    }

    # Tags and categories (public, for SEO, EN/RU/PT)
    location ~ ^/(ru/|pt/)?tags/ {
        auth_request off;
        include /etc/nginx/snippets/security-headers-public.conf;
    }
    location ~ ^/(ru/|pt/)?categories/ {
        auth_request off;
        include /etc/nginx/snippets/security-headers-public.conf;
    }

    # Homepage — public landing page (EN)
    location = / {
        auth_request off;
        include /etc/nginx/snippets/security-headers-public.conf;
    }
    location = /index.html {
        auth_request off;
        include /etc/nginx/snippets/security-headers-public.conf;
    }
    # RU homepage (alias+try_files to avoid index internal redirect)
    location = /ru/ {
        auth_request off;
        alias /usr/share/nginx/html/ru/;
        try_files index.html =404;
        include /etc/nginx/snippets/security-headers-public.conf;
    }
    # PT homepage (alias+try_files to avoid index internal redirect)
    location = /pt/ {
        auth_request off;
        alias /usr/share/nginx/html/pt/;
        try_files index.html =404;
        include /etc/nginx/snippets/security-headers-public.conf;
    }

    # Reviews: no OAuth, protected by StatiCrypt per-client passwords
    # location /reviews/ {
    #     auth_request off;
    # }

    # --- Security Headers (Full Compliance) ---
    # Server-level: applies to all auth-protected locations (default)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header X-XSS-Protection "0" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.folkup.app; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://analytics.folkup.app; frame-src 'none'; worker-src 'self' blob:; base-uri 'self'; form-action 'self';" always;

    # --- Caching ---
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
        auth_request off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/snippets/security-headers-auth.conf;
    }

    location ~* \.(css|js|woff|woff2|ttf|eot)$ {
        auth_request off;
        expires 7d;
        add_header Cache-Control "public";
        include /etc/nginx/snippets/security-headers-auth.conf;
    }

    # --- Error pages ---
    error_page 403 /403.html;
    error_page 404 /404.html;

    location = /403.html {
        auth_request off;
        internal;
        include /etc/nginx/snippets/security-headers-auth.conf;
    }

    # Sitemaps — public (for search engines)
    location ~* /sitemap\.xml$ {
        auth_request off;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # --- Hugo clean URLs ---
    location / {
        try_files $uri $uri/ =404;
    }
}
