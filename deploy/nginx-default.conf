server {
    listen 80;
    server_name lucerna.folkup.app;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # --- OAuth2 Proxy (auth_request mode) ---
    location = /oauth2/auth {
        internal;
        proxy_pass http://oauth2-proxy-app:4180/oauth2/auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Uri $request_uri;
        proxy_set_header Content-Length "";
        proxy_pass_request_body off;
        proxy_buffer_size 8k;
    }

    location /oauth2/ {
        auth_request off;
        proxy_pass http://oauth2-proxy-app:4180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Auth-Request-Redirect $scheme://$host$request_uri;
    }

    # Require authentication (Tier 2 — any Keycloak user)
    auth_request /oauth2/auth;
    error_page 401 = /oauth2/sign_in;
    auth_request_set $auth_user $upstream_http_x_auth_request_user;
    auth_request_set $auth_groups $upstream_http_x_auth_request_groups;

    # --- Public URLs (no auth required) ---
    # Legal pages (GDPR compliance, both EN and RU)
    location /legal/ {
        auth_request off;
    }
    location /ru/legal/ {
        auth_request off;
    }

    # OSINT dossiers (public, for sharing with lawyers/subjects)
    location = /x713.html {
        auth_request off;  # OSINT dossier, public by design
    }

    # Named location for Basic Auth 401 (prevents OAuth2 error_page hijack)
    location @basic_challenge {
        add_header WWW-Authenticate 'Basic realm="FP3D Case Files"' always;
        add_header Content-Type 'text/plain' always;
        return 401 'Authentication Required';
    }

    # FP3D case files — Basic Auth (INC-003, 07.03.2026)
    location = /fp3d.html {
        auth_request off;
        auth_basic "FP3D Case Files";
        auth_basic_user_file /etc/nginx/htpasswd;
        error_page 401 = @basic_challenge;
    }
    location = /fp3d-dashboard.html {
        auth_request off;
        auth_basic "FP3D Case Files";
        auth_basic_user_file /etc/nginx/htpasswd;
        error_page 401 = @basic_challenge;
    }

    # Mushroom & Brain series (10 articles, RU + EN)
    location ~ ^/(ru/)?investigations/mushroom-brain- {
        auth_request off;
    }

    # Reviews: no OAuth, protected by StatiCrypt per-client passwords
    # location /reviews/ {
    #     auth_request off;
    # }

    # --- Security Headers (Full Compliance) ---
    # Note: these must be repeated in location blocks that use add_header,
    # because nginx's add_header in a location block overrides ALL parent headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header X-XSS-Protection "0" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.folkup.app; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://analytics.folkup.app; frame-src 'none'; worker-src 'self' blob:; base-uri 'self'; form-action 'self';" always;

    # --- Caching ---
    # Each location block repeats security headers (nginx inheritance rule)
    # Static assets don't need auth (SSO cookie covers them for authenticated pages,
    # public pages serve assets without auth via parent location's auth_request off)
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
        auth_request off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header X-XSS-Protection "0" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.folkup.app; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://analytics.folkup.app; frame-src 'none'; worker-src 'self' blob:; base-uri 'self'; form-action 'self';" always;
    }

    location ~* \.(css|js|woff|woff2|ttf|eot)$ {
        auth_request off;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header X-XSS-Protection "0" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.folkup.app; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://analytics.folkup.app; frame-src 'none'; worker-src 'self' blob:; base-uri 'self'; form-action 'self';" always;
    }

    # --- Error pages ---
    error_page 404 /404.html;

    # Block sitemap from unauthenticated access (defense in depth, INC-003)
    location ~* /sitemap\.xml$ {
        # Inherits auth_request from parent — explicit for clarity
    }

    # --- Hugo clean URLs ---
    location / {
        try_files $uri $uri/ =404;
    }
}
