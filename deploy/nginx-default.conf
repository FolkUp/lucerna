server {
    listen 80;
    server_name lucerna.folkup.app;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # --- Access Control ---
    # Basic auth: only authorized users
    auth_basic "Lucerna — Private Access";
    auth_basic_user_file /etc/nginx/htpasswd;

    # Allow legal pages without auth
    location /legal/ {
        auth_basic off;
    }

    # --- Security Headers (Full Compliance) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header X-XSS-Protection "0" always;

    # HSTS — enforce HTTPS (1 year, include subdomains)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # No indexing — private site
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    # CSP — Blowfish theme + Umami analytics
    # Note: 'unsafe-inline' required by Blowfish (inline scripts/styles for theme functionality)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.folkup.app; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://analytics.folkup.app; frame-src 'none'; worker-src 'self' blob:; base-uri 'self'; form-action 'self';" always;

    # --- Caching ---
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(css|js|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- Error pages ---
    error_page 404 /404.html;

    # --- Hugo clean URLs ---
    location / {
        try_files $uri $uri/ =404;
    }
}
