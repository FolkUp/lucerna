# ============================================================================
# DOCUMENTATION
# ============================================================================

# Log Format Variables (nginx standard):
#
# $remote_addr       - Client IP address
# $remote_user       - Authenticated user name
# $time_iso8601      - Time in ISO 8601 format
# $request_method    - HTTP method (GET, POST, etc.)
# $request_uri       - Full request URI including query string
# $server_protocol   - HTTP protocol version
# $status            - HTTP response status code
# $request_time      - Total request time in seconds
# $body_bytes_sent   - Response body size
# $content_length    - Request body size
# $http_referer      - HTTP referer header
# $http_user_agent   - User agent string
# $ssl_protocol      - SSL/TLS protocol version
# $ssl_cipher        - SSL/TLS cipher suite
# $connection        - Connection sequence number
# $request_id        - Unique request ID
#
# Custom Variables:
#
# $event_type        - Custom event classification
# $auth_header       - Presence of Authorization header
# $auth_success      - Authentication result
# $security_event    - Security-related event type
# $security_action   - Response action taken
# $auth_failure      - Reason for authentication failure
# $auth_attempts     - Number of auth attempts
# $request_count     - Requests in time window
# $unique_paths      - Number of unique paths accessed
# $response_codes    - Distribution of response codes
# $bytes_total       - Total bytes transferred
# $access_pattern    - Detected access pattern type

