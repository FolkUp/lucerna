# ============================================================================
# SECURITY CONSIDERATIONS
# ============================================================================

# 1. LOG PERMISSIONS
#    - Logs contain authentication attempts (potential PII)
#    - Restrict access: chmod 640 /var/log/nginx/flightpath3d/*.log
#    - Owner: www-data (www-data must be able to write)
#    - Group: www-data or root
#
# 2. LOG RETENTION
#    - Daily rotation recommended
#    - 90-day retention for compliance
#    - Compress old logs to save space
#
# 3. SENSITIVE DATA
#    - Authorization header contains credentials (base64 encoded)
#    - Consider redacting in downstream processing
#    - Separate files for different sensitivity levels
#
# 4. LOG ANALYSIS
#    - Implement fail2ban for brute-force protection
#    - Monitor for suspicious patterns
#    - Alert on authentication anomalies
#
# 5. COMPLIANCE
#    - GDPR: Store only necessary data, implement retention policy
#    - Security audits: Maintain detailed access logs
#    - Incident response: Preserve logs for forensics
#
# 6. PERFORMANCE
#    - Conditional logging (if=$variable) reduces overhead
#    - Disable detailed logging in high-traffic scenarios
#    - Use log sampling for performance metrics

