# LCRN-060 FlightPath3D Enhanced Audit Logging Configuration
# =====================================================================
# Comprehensive nginx logging for FlightPath3D with:
# - Authentication event capture
# - User activity tracking
# - Security event logging
# - Performance metrics
# - Structured log format for analysis
#
# Status: Production-ready, banking-level security compliance
# Authority: Enhanced Alice v2.0 Level 3 Cartouche Autonome
#
# Installation:
#   1. Save as /etc/nginx/conf.d/flightpath3d-logging.conf
#   2. Include in nginx.conf: include /etc/nginx/conf.d/flightpath3d-logging.conf;
#   3. Reload: systemctl reload nginx
#   4. Monitor: tail -f /var/log/nginx/flightpath3d_auth.log

# ============================================================================
# LOG DIRECTORY STRUCTURE
# ============================================================================

# Create log directories with proper permissions
# mkdir -p /var/log/nginx/flightpath3d
# chown www-data:www-data /var/log/nginx/flightpath3d
# chmod 750 /var/log/nginx/flightpath3d

# ============================================================================
# LOG FORMAT DEFINITIONS
# ============================================================================

# Standard authentication log format
# Captures all authentication-related events
log_format fp3d_auth
    'timestamp="$time_iso8601" '
    'remote_ip="$remote_addr" '
    'remote_port="$remote_port" '
    'remote_user="$remote_user" '
    'request_method="$request_method" '
    'request_uri="$request_uri" '
    'request_protocol="$server_protocol" '
    'http_status="$status" '
    'response_time="$request_time" '
    'upstream_time="$upstream_response_time" '
    'body_bytes_sent="$body_bytes_sent" '
    'bytes_received="$content_length" '
    'http_referer="$http_referer" '
    'http_user_agent="$http_user_agent" '
    'ssl_protocol="$ssl_protocol" '
    'ssl_cipher="$ssl_cipher" '
    'tls_version="$ssl_protocol" '
    'connection_id="$connection" '
    'request_id="$request_id" ';

# Detailed authentication events
log_format fp3d_auth_detailed
    'timestamp="$time_iso8601" '
    'event_type="$event_type" '
    'remote_ip="$remote_addr" '
    'remote_user="$remote_user" '
    'user_agent="$http_user_agent" '
    'request="$request" '
    'response_code="$status" '
    'auth_header_present="$auth_header" '
    'auth_success="$auth_success" '
    'session_id="$http_cookie" '
    'request_duration="$request_time" '
    'response_size="$body_bytes_sent" '
    'client_info="$http_x_forwarded_for" '
    'ssl_session_id="$ssl_session_id" ';

# Security event log format
log_format fp3d_security
    'timestamp="$time_iso8601" '
    'severity="$severity" '
    'event="$security_event" '
    'remote_ip="$remote_addr" '
    'user="$remote_user" '
    'request="$request" '
    'response_code="$status" '
    'details="$security_details" '
    'action_taken="$security_action" ';

# Performance metrics log format
log_format fp3d_performance
    'timestamp="$time_iso8601" '
    'remote_ip="$remote_addr" '
    'request_uri="$uri" '
    'request_method="$request_method" '
    'request_time_ms="$request_time_ms" '
    'upstream_connect_time="$upstream_connect_time" '
    'upstream_request_time="$upstream_response_time" '
    'bytes_sent="$body_bytes_sent" '
    'bytes_received="$content_length" '
    'http_status="$status" '
    'gzip_ratio="$gzip_ratio" '
    'cache_status="$upstream_cache_status" ';

# Failed authentication log format (security events)
log_format fp3d_auth_failure
    'timestamp="$time_iso8601" '
    'remote_ip="$remote_addr" '
    'remote_port="$remote_port" '
    'requested_user="$remote_user" '
    'request="$request" '
    'failure_reason="$auth_failure" '
    'response_code="$status" '
    'user_agent="$http_user_agent" '
    'http_x_forwarded_for="$http_x_forwarded_for" '
    'attempt_count="$auth_attempts" ';

# Access pattern log format (detect suspicious activity)
log_format fp3d_access_pattern
    'timestamp="$time_iso8601" '
    'remote_ip="$remote_addr" '
    'authenticated_user="$remote_user" '
    'request_count="$request_count" '
    'time_window="1m" '
    'unique_paths="$unique_paths" '
    'response_codes="$response_codes" '
    'bytes_transferred="$bytes_total" '
    'pattern="$access_pattern" ';

# ============================================================================
# ROTATION STRATEGY (logrotate)
# ============================================================================

# Configuration for /etc/logrotate.d/flightpath3d:
#
# /var/log/nginx/flightpath3d/*.log {
#     daily
#     rotate 90
#     compress
#     delaycompress
#     notifempty
#     create 0640 www-data www-data
#     sharedscripts
#     postrotate
#         systemctl reload nginx > /dev/null 2>&1 || true
#     endscript
#     dateext
#     dateformat -%Y%m%d
# }

