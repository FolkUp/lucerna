# ============================================================================
# TROUBLESHOOTING
# ============================================================================

# fail2ban not blocking IPs:
# 1. Check filter regex: fail2ban-regex <logfile> <filter>
# 2. Verify jail is enabled: fail2ban-client status <jail>
# 3. Check log file path: ls -la /var/log/nginx/flightpath3d/
# 4. Review fail2ban.log for errors: tail -f /var/log/fail2ban.log

# False positives (legitimate users banned):
# 1. Adjust maxretry (increase from 5 to 10)
# 2. Increase findtime (allow more time between attempts)
# 3. Whitelist legitimate IP addresses
# 4. Use ignoreregex to exclude specific patterns

# Email notifications not working:
# 1. Test postfix: echo "test" | mail -s "Test" admin@example.com
# 2. Check fail2ban email action: cat /etc/fail2ban/action.d/sendmail.conf
# 3. Review fail2ban.log for sendmail errors
# 4. Verify dest email address is correct

# Performance impact:
# 1. Monitor fail2ban process: ps aux | grep fail2ban
# 2. Check regex complexity (avoid catastrophic backtracking)
# 3. Reduce log file size if very large (rotate more frequently)
# 4. Consider separating jails to different threads
