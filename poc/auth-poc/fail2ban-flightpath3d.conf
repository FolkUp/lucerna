# ============================================================================
# ADVANCED CONFIGURATION
# ============================================================================

# Dynamic ban escalation (using multiple jails):
#
# First attempt: 5 failures → 30 minute ban
# Repeat offender: 2 failures in 1 hour → 24 hour ban
# Severe abuser: 1 failure in 5 minutes → 7 day ban
#
# Configuration chain:
# 1. User hits jail 1 → 30 min ban
# 2. User hits jail 1 again within 1 hour → jail 2 triggers → 24 hour ban
# 3. User hits jail 2 while already banned → jail 3 triggers → 7 day ban

# Country-based blocking (optional):
