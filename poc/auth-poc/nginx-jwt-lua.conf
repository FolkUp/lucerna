# LCRN-060 PoC: nginx Lua JWT Authentication
# Alternative approach: JWT validation directly in nginx
# Addresses Alpha concern: serverless auth without separate backend

# Install required: lua-resty-jwt, lua-resty-string
# apt-get install libnginx-mod-http-lua lua-resty-jwt

server {
    listen 443 ssl;
    server_name lucerna.folkup.app;

    # SSL configuration (existing)
    ssl_certificate /etc/ssl/certs/lucerna.crt;
    ssl_certificate_key /etc/ssl/private/lucerna.key;

    # Lua shared dictionary for JWT secrets and cache
    lua_shared_dict jwt_cache 10m;
    lua_shared_dict auth_cache 1m;

    # Initialize JWT secret on nginx start
    init_by_lua_block {
        local jwt_secret = os.getenv("JWT_SECRET") or "your-default-secret"
        ngx.shared.jwt_cache:set("secret", jwt_secret)
    }

    # JWT Authentication endpoints
    location /api/auth/login {
        content_by_lua_block {
            local cjson = require("cjson")
            local jwt = require("resty.jwt")
            local string = require("resty.string")

            if ngx.req.get_method() ~= "POST" then
                ngx.status = 405
                ngx.say(cjson.encode({error = "Method not allowed"}))
                return
            end

            -- Read request body
            ngx.req.read_body()
            local body = ngx.req.get_body_data()

            if not body then
                ngx.status = 400
                ngx.say(cjson.encode({error = "Request body required"}))
                return
            end

            local data = cjson.decode(body)
            local username = data.username
            local password = data.password

            if not username or not password then
                ngx.status = 400
                ngx.say(cjson.encode({error = "Username and password required"}))
                return
            end

            -- Validate credentials against htpasswd file
            local valid = validate_htpasswd_credentials(username, password)

            if not valid then
                ngx.status = 401
                ngx.say(cjson.encode({error = "Invalid credentials"}))
                return
            end

            -- Generate JWT token
            local jwt_secret = ngx.shared.jwt_cache:get("secret")
            local now = ngx.time()
            local exp = now + 1800  -- 30 minutes

            local payload = {
                user = username,
                iat = now,
                exp = exp,
                iss = "lucerna-auth"
            }

            local token = jwt:sign(jwt_secret, {
                header = {typ = "JWT", alg = "HS256"},
                payload = payload
            })

            if not token then
                ngx.status = 500
                ngx.say(cjson.encode({error = "Token generation failed"}))
                return
            end

            -- Set secure cookie
            ngx.header["Set-Cookie"] = string.format(
                "auth_token=%s; Path=/; HttpOnly; Secure; SameSite=Strict; Max-Age=1800",
                token
            )

            ngx.header["Content-Type"] = "application/json"
            ngx.say(cjson.encode({
                token = token,
                user = username,
                expires = exp,
                success = true
            }))
        }
    }

    location /api/auth/verify {
        content_by_lua_block {
            local cjson = require("cjson")
            local jwt = require("resty.jwt")

            local token = extract_jwt_token()

            if not token then
                ngx.status = 401
                ngx.say(cjson.encode({error = "No token provided"}))
                return
            end

            local jwt_secret = ngx.shared.jwt_cache:get("secret")
            local verified = jwt:verify(jwt_secret, token)

            if not verified.valid then
                ngx.status = 401
                ngx.say(cjson.encode({
                    error = "Invalid token",
                    reason = verified.reason
                }))
                return
            end

            ngx.header["Content-Type"] = "application/json"
            ngx.say(cjson.encode({
                valid = true,
                user = verified.payload.user,
                expires = verified.payload.exp
            }))
        }
    }

    location /api/auth/refresh {
        content_by_lua_block {
            local cjson = require("cjson")
            local jwt = require("resty.jwt")

            local token = extract_jwt_token()

            if not token then
                ngx.status = 401
                ngx.say(cjson.encode({error = "No token provided"}))
                return
            end

            local jwt_secret = ngx.shared.jwt_cache:get("secret")
            local verified = jwt:verify(jwt_secret, token)

            if not verified.valid then
                ngx.status = 401
                ngx.say(cjson.encode({error = "Invalid token"}))
                return
            end

            local now = ngx.time()
            local time_to_expiry = verified.payload.exp - now

            -- Only refresh if within last 5 minutes
            if time_to_expiry > 300 then
                ngx.status = 400
                ngx.say(cjson.encode({error = "Token not eligible for refresh"}))
                return
            end

            -- Generate new token
            local new_exp = now + 1800
            local new_payload = {
                user = verified.payload.user,
                iat = now,
                exp = new_exp,
                iss = "lucerna-auth"
            }

            local new_token = jwt:sign(jwt_secret, {
                header = {typ = "JWT", alg = "HS256"},
                payload = new_payload
            })

            ngx.header["Set-Cookie"] = string.format(
                "auth_token=%s; Path=/; HttpOnly; Secure; SameSite=Strict; Max-Age=1800",
                new_token
            )

            ngx.header["Content-Type"] = "application/json"
            ngx.say(cjson.encode({
                token = new_token,
                user = verified.payload.user,
                expires = new_exp,
                success = true
            }))
        }
    }

    # Protected content - require JWT validation
    location /search/ {
        access_by_lua_block {
            local jwt = require("resty.jwt")

            local token = extract_jwt_token()

            if not token then
                ngx.status = 401
                ngx.header["Content-Type"] = "application/json"
                ngx.say('{"error": "Authentication required"}')
                ngx.exit(401)
            end

            local jwt_secret = ngx.shared.jwt_cache:get("secret")
            local verified = jwt:verify(jwt_secret, token)

            if not verified.valid then
                ngx.status = 401
                ngx.header["Content-Type"] = "application/json"
                ngx.say('{"error": "Invalid or expired token"}')
                ngx.exit(401)
            end

            -- Store user info for logging
            ngx.var.authenticated_user = verified.payload.user
        }

        try_files $uri $uri/ @hugo;
    }

    # Hugo static files
    location @hugo {
        root /var/www/lucerna/public;
        try_files $uri $uri/ =404;
    }

    # Public content (no auth required)
    location / {
        root /var/www/lucerna/public;
        try_files $uri $uri/ =404;
    }
}

# Lua helper functions
init_worker_by_lua_block {
    -- Global helper functions

    function extract_jwt_token()
        -- Try Authorization header first
        local auth_header = ngx.var.http_authorization
        if auth_header and string.match(auth_header, "Bearer%s+(.+)") then
            return string.match(auth_header, "Bearer%s+(.+)")
        end

        -- Try cookie as fallback
        local cookies = ngx.var.http_cookie
        if cookies then
            local token = string.match(cookies, "auth_token=([^;]+)")
            if token then
                return token
            end
        end

        return nil
    end

    function validate_htpasswd_credentials(username, password)
        -- Read htpasswd file
        local htpasswd_file = "/etc/nginx/.htpasswd"
        local file = io.open(htpasswd_file, "r")

        if not file then
            ngx.log(ngx.ERR, "Cannot open htpasswd file: " .. htpasswd_file)
            return false
        end

        for line in file:lines() do
            local user, hash = string.match(line, "([^:]+):(.+)")
            if user == username then
                file:close()
                -- For PoC: simplified validation
                -- TODO: Implement proper bcrypt validation
                return validate_bcrypt_hash(password, hash)
            end
        end

        file:close()
        return false
    end

    function validate_bcrypt_hash(password, hash)
        -- PoC: Simplified bcrypt validation
        -- In production, use lua-resty-bcrypt
        if string.match(hash, "^%$2[yab]%$") then
            -- For PoC testing, accept any password
            -- TODO: Implement proper bcrypt
            return true
        end
        return false
    end
}