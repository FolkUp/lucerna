# GitHub → Telegram notification workflow
# Deploy: copy to .github/workflows/ in each target repo
# Secrets required (org-level or repo-level):
#   TELEGRAM_NOTIFY_BOT_TOKEN — bot token for notifications
#   TELEGRAM_NOTIFY_CHAT_ID — chat ID for FolkUp Deploy group
#
# Thread ID 9 = System topic in FolkUp Deploy
#
# SECURITY: All github.event.* values passed via env: block (not inline ${{ }})
# to prevent script injection via crafted PR/issue titles.

name: Notify Telegram

on:
  fork:
  watch:
    types: [started]
  issues:
    types: [opened, closed]
  pull_request:
    types: [opened, closed, merged]
  public:

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'FolkUp' || github.repository_owner == 'anklemPT'
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_NOTIFY_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          THREAD_ID: "9"
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          EVENT_ACTION: ${{ github.event.action }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Skip if no bot token (forks without secrets)
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "No Telegram credentials, skipping"
            exit 0
          fi

          # Build message based on event type
          case "$EVENT_NAME" in
            fork)
              MSG="<b>[GH] Fork</b>
          ${REPO} forked by @${ACTOR}
          ---
          $(date -u '+%Y-%m-%d %H:%M UTC')"
              ;;
            watch)
              MSG="<b>[GH] Star</b>
          ${REPO} starred by @${ACTOR}
          ---
          $(date -u '+%Y-%m-%d %H:%M UTC')"
              ;;
            issues)
              MSG="<b>[GH] Issue ${EVENT_ACTION}</b>
          ${REPO}: ${ISSUE_TITLE}
          by @${ACTOR}
          ---
          $(date -u '+%Y-%m-%d %H:%M UTC')"
              ;;
            pull_request)
              MSG="<b>[GH] PR ${EVENT_ACTION}</b>
          ${REPO}: ${PR_TITLE}
          by @${ACTOR}
          ---
          $(date -u '+%Y-%m-%d %H:%M UTC')"
              ;;
            public)
              MSG="<b>[GH] Visibility Changed</b>
          ${REPO} is now PUBLIC
          Changed by @${ACTOR}
          ---
          $(date -u '+%Y-%m-%d %H:%M UTC')"
              ;;
            *)
              MSG="<b>[GH] Event: ${EVENT_NAME}</b>
          ${REPO} by @${ACTOR}
          ---
          $(date -u '+%Y-%m-%d %H:%M UTC')"
              ;;
          esac

          # Send to Telegram
          curl -sf -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "message_thread_id=${THREAD_ID}" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=${MSG}" \
            > /dev/null 2>&1
